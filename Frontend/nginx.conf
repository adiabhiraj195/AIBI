server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Frontend Static Files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Backend Brain (Multi-Agent RAG)
    location /api/brain/ {
        # Rewrite URL to remove the /api/brain prefix before passing to backend
        rewrite ^/api/brain/(.*) /$1 break;
        
        proxy_pass http://backend-brain:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long-running AI queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy to Backend CSV (File Uploads)
    location /api/csv/ {
        # Rewrite URL to remove the /api/csv prefix before passing to backend
        rewrite ^/api/csv/(.*) /$1 break; 

        proxy_pass http://backend-csv:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase limits for large file uploads
        client_max_body_size 100M;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
